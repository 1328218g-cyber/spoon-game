<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>스푼 봇</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f13;--surface:#1a1a22;--border:#2a2a36;--accent:#7c6aff;--accent2:#ff6ab0;--text:#e8e8f0;--muted:#6b6b80;--success:#4ade80;--danger:#f87171;--radius:14px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:16px;max-width:480px;margin:0 auto}
header{display:flex;align-items:center;gap:10px;margin-bottom:24px;padding-top:8px}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
h1{font-size:20px;font-weight:700}
.status-badge{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:5px 12px;border-radius:20px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background 0.3s}
.dot.on{background:var(--success);box-shadow:0 0 6px var(--success)}
.dot.off{background:var(--danger)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:14px}
label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px;margin-top:12px}
label:first-of-type{margin-top:0}
input,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s;font-family:inherit}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:none;height:80px}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
button{padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.15s,transform 0.1s;font-family:inherit}
button:active{transform:scale(0.97);opacity:0.85}
.btn-connect{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-disconnect{background:var(--bg);border:1px solid var(--border);color:var(--danger)}
.btn-full{width:100%;margin-top:12px;background:var(--bg);border:1px solid var(--accent);color:var(--accent)}
.chat-log{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;height:180px;overflow-y:auto;font-size:13px;line-height:1.6;margin-bottom:12px}
.chat-log:empty::before{content:'채팅 로그가 여기에 표시됩니다';color:var(--muted)}
.log-line{margin-bottom:4px}
.nick{color:var(--accent);font-weight:600}
.nick.bot{color:var(--accent2)}
.nick.sys{color:var(--muted)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:14px;transition:transform 0.3s ease;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.chat-input-row{display:flex;gap:8px}
.chat-input-row input{flex:1}
.chat-input-row button{padding:11px 16px;background:var(--accent);color:#fff;border-radius:10px;font-size:14px;white-space:nowrap}
</style>
</head>
<body>
<header>
<div class="logo">🥄</div>
<h1>스푼 봇</h1>
<div class="status-badge"><div class="dot off" id="statusDot"></div><span id="statusText">오프라인</span></div>
</header>
<div class="card">
<div class="card-title">연결 설정</div>
<label>Access Token</label>
<input type="password" id="accessToken" placeholder="Access 토큰 입력">
<label>Room Token</label>
<input type="password" id="roomToken" placeholder="Room 토큰 입력">
<label>Channel ID</label>
<input type="text" id="channelId" placeholder="채널 ID 입력" inputmode="numeric">
<div class="btn-row">
<button class="btn-connect" onclick="connect()">🔗 연결</button>
<button class="btn-disconnect" onclick="disconnect()">✂️ 해제</button>
</div>
</div>
<div class="card">
<div class="card-title">실시간 채팅</div>
<div class="chat-log" id="chatLog"></div>
<div class="chat-input-row">
<input type="text" id="chatInput" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')sendChat()">
<button onclick="sendChat()">전송</button>
</div>
</div>
<div class="card">
<div class="card-title">자동 멘트</div>
<label>입장 멘트 (줄바꿈으로 여러 개, {nickname} 사용 가능)</label>
<textarea id="joinMessages" placeholder="{nickname}님 환영합니다!"></textarea>
<label>좋아요 멘트</label>
<textarea id="likeMessages" placeholder="{nickname}님 감사해요 ♥"></textarea>
<button class="btn-full" onclick="saveSettings()">💾 멘트 저장</button>
</div>
<div class="toast" id="toast"></div>
<script>
const SERVER='https://spoon-game-production.up.railway.app';
window.onload=()=>{
['accessToken','roomToken','channelId','joinMessages','likeMessages'].forEach(k=>{
const el=document.getElementById(k);if(el)el.value=localStorage.getItem(k)||'';
});
checkStatus();
setInterval(checkStatus,5000);
};
['accessToken','roomToken','channelId'].forEach(k=>{
document.getElementById(k)?.addEventListener('input',()=>localStorage.setItem(k,document.getElementById(k).value));
});
async function connect(){
const a=document.getElementById('accessToken').value.trim();
const r=document.getElementById('roomToken').value.trim();
const c=document.getElementById('channelId').value.trim();
if(!a||!r||!c)return showToast('토큰과 채널ID를 입력해주세요');
try{
const res=await fetch(SERVER+'/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accessToken:a,roomToken:r,channelId:c})});
const d=await res.json();
if(d.success){showToast('연결 중...');setTimeout(checkStatus,1500);await saveSettings();}
else showToast('연결 실패: '+(d.error||''));
}catch(e){showToast('서버 오류: '+e.message);}
}
async function disconnect(){
try{await fetch(SERVER+'/disconnect',{method:'POST'});setStatus(false);showToast('연결 해제됨');}
catch(e){showToast('오류: '+e.message);}
}
async function sendChat(){
const input=document.getElementById('chatInput');
const msg=input.value.trim();if(!msg)return;input.value='';
try{
await fetch(SERVER+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
addLog('봇',msg,'bot');
}catch(e){showToast('전송 실패');}
}
async function saveSettings(){
const j=document.getElementById('joinMessages').value;
const l=document.getElementById('likeMessages').value;
localStorage.setItem('joinMessages',j);localStorage.setItem('likeMessages',l);
const jm=j.split('\n').filter(x=>x.trim()).map(x=>({text:x.trim(),enabled:true}));
const lm=l.split('\n').filter(x=>x.trim()).map(x=>({text:x.trim(),enabled:true}));
try{
await fetch(SERVER+'/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({joinMessages:jm,likeMessages:lm,cmds:[]})});
showToast('저장 완료 ✓');
}catch(e){showToast('저장 실패');}
}
async function checkStatus(){
try{const res=await fetch(SERVER+'/status');const d=await res.json();setStatus(d.isConnected);}catch{}
}
function setStatus(on){
document.getElementById('statusDot').className='dot '+(on?'on':'off');
document.getElementById('statusText').textContent=on?'온라인':'오프라인';
}
function addLog(nick,text,type='user'){
const log=document.getElementById('chatLog');
const line=document.createElement('div');line.className='log-line';
line.innerHTML='<span class="nick '+type+'">'+nick+'</span> '+text;
log.appendChild(line);log.scrollTop=log.scrollHeight;
}
function showToast(msg){
const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
